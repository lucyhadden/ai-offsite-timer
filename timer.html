<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Offsite Timer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0D1B2A;
    --teal: #00B4D8;
    --teal-dark: #0077B6;
    --mint: #90E0EF;
    --light: #CAF0F8;
    --card: #0A2535;
    --text: #E0F7FA;
    --muted: #7ECAD9;
    --green: #00C897;
    --amber: #F5A623;
    --red: #FF5C5C;
  }
  body {
    background: var(--navy);
    color: var(--text);
    font-family: -apple-system, 'Segoe UI', Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 2rem 1rem;
  }
  header { text-align: center; margin-bottom: 2rem; }
  header h1 { font-size: 1.5rem; font-weight: 700; color: #fff; letter-spacing: 0.05em; }
  header p { font-size: 0.85rem; color: var(--muted); margin-top: 0.3rem; }

  .timer-card {
    background: var(--card);
    border: 1.5px solid var(--teal-dark);
    border-radius: 16px;
    padding: 2rem 2.5rem;
    width: 100%;
    max-width: 420px;
    text-align: center;
    margin-bottom: 1.5rem;
  }
  .session-label {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--mint);
    margin-bottom: 0.5rem;
  }
  .time-display {
    font-size: 5rem;
    font-weight: 700;
    letter-spacing: -3px;
    font-variant-numeric: tabular-nums;
    color: #fff;
    line-height: 1;
    margin: 0.5rem 0;
    transition: color 0.4s;
  }
  .time-display.warning { color: var(--amber); }
  .time-display.danger { color: var(--red); }
  .progress-bar {
    height: 8px;
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
    overflow: hidden;
    margin: 1.2rem 0;
  }
  .progress-fill {
    height: 100%;
    background: var(--teal);
    border-radius: 4px;
    transition: width 1s linear, background 0.4s;
  }
  .progress-fill.warning { background: var(--amber); }
  .progress-fill.danger { background: var(--red); }
  .controls { display: flex; gap: 12px; justify-content: center; margin-top: 1.2rem; }
  .btn {
    padding: 10px 28px;
    border-radius: 8px;
    border: 1.5px solid rgba(255,255,255,0.2);
    background: transparent;
    color: #fff;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .btn:hover { background: rgba(255,255,255,0.08); }
  .btn.primary { background: var(--teal); color: var(--navy); border-color: var(--teal); }
  .btn.primary:hover { background: var(--teal-dark); border-color: var(--teal-dark); color: #fff; }

  .agenda {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .agenda-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.08);
    background: var(--card);
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .agenda-item:hover { background: rgba(255,255,255,0.06); }
  .agenda-item.active { border-color: var(--teal); background: rgba(0,180,216,0.1); }
  .agenda-item.done { opacity: 0.35; }
  .item-num {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: rgba(255,255,255,0.07);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
    color: var(--muted);
    flex-shrink: 0;
  }
  .agenda-item.active .item-num { background: var(--teal); color: var(--navy); }
  .item-info { flex: 1; min-width: 0; text-align: left; }
  .item-name { font-size: 14px; font-weight: 600; color: #fff; }
  .item-time-label { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .agenda-item.active .item-name { color: var(--mint); }
  .item-dur { font-size: 13px; font-weight: 600; color: var(--muted); font-variant-numeric: tabular-nums; flex-shrink: 0; }
  .agenda-item.active .item-dur { color: var(--teal); }

  .complete-msg {
    text-align: center;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--green);
    padding: 0.5rem 0 1rem;
    display: none;
  }
</style>
</head>
<body>
<header>
  <h1>AI OFFSITE — 30 APRIL 2026</h1>
  <p>Agentic AI in Payments · Session Timer</p>
</header>

<div class="timer-card">
  <div class="session-label" id="cur-label">Select an item to begin</div>
  <div class="time-display" id="time-display">00:00</div>
  <div class="progress-bar"><div class="progress-fill" id="prog" style="width:100%"></div></div>
  <div class="complete-msg" id="done-msg">Session complete! 🎉</div>
  <div class="controls">
    <button class="btn primary" id="btn-start" onclick="toggleTimer()">Start</button>
    <button class="btn" onclick="resetTimer()">Reset</button>
    <button class="btn" onclick="nextItem()">Next →</button>
  </div>
</div>

<div class="agenda" id="agenda-list"></div>

<script>
const items = [
  { name: "Kick-off & teams",     time: "9:00 – 9:15",   secs: 15 * 60 },
  { name: "Brainstorm & ideation",time: "9:15 – 9:45",   secs: 30 * 60 },
  { name: "Prototyping",          time: "9:45 – 10:30",  secs: 45 * 60 },
  { name: "Present ideas",        time: "10:30 – 10:45", secs: 15 * 60 },
  { name: "Swap & critique",      time: "10:45 – 10:55", secs: 10 * 60 },
  { name: "Wrap-up",              time: "10:55 – 11:00", secs:  5 * 60 },
];

let cur = 0, remaining = 0, running = false, iv = null;

function fmt(s) {
  return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
}

function render() {
  const list = document.getElementById('agenda-list');
  list.innerHTML = '';
  items.forEach((item, i) => {
    const d = document.createElement('div');
    d.className = 'agenda-item' + (i===cur?' active':i<cur?' done':'');
    d.innerHTML = `<div class="item-num">${i+1}</div><div class="item-info"><div class="item-name">${item.name}</div><div class="item-time-label">${item.time}</div></div><div class="item-dur">${fmt(item.secs)}</div>`;
    d.onclick = () => selectItem(i);
    list.appendChild(d);
  });
}

function selectItem(i) {
  clearInterval(iv); iv=null; running=false;
  cur=i; remaining=items[i].secs;
  document.getElementById('done-msg').style.display='none';
  document.getElementById('btn-start').textContent='Start';
  document.getElementById('btn-start').className='btn primary';
  updateDisplay(); render();
}

function updateDisplay() {
  const pct = remaining / items[cur].secs * 100;
  const tEl = document.getElementById('time-display');
  const pEl = document.getElementById('prog');
  document.getElementById('cur-label').textContent = items[cur].name;
  tEl.textContent = fmt(remaining);
  const warn = remaining <= 60 && remaining > 0;
  const danger = remaining === 0;
  tEl.className = 'time-display' + (danger?' danger':warn?' warning':'');
  pEl.style.width = pct + '%';
  pEl.className = 'progress-fill' + (danger?' danger':warn?' warning':'');
}

function toggleTimer() {
  if (!running) {
    if (remaining===0) remaining=items[cur].secs;
    running=true;
    document.getElementById('btn-start').textContent='Pause';
    iv = setInterval(()=>{
      if (remaining>0) { remaining--; updateDisplay(); }
      else { clearInterval(iv); running=false; document.getElementById('btn-start').textContent='Restart'; }
    }, 1000);
  } else {
    clearInterval(iv); iv=null; running=false;
    document.getElementById('btn-start').textContent='Start';
  }
}

function resetTimer() {
  clearInterval(iv); iv=null; running=false;
  remaining=items[cur].secs;
  document.getElementById('btn-start').textContent='Start';
  updateDisplay();
}

function nextItem() {
  clearInterval(iv); iv=null; running=false;
  if (cur < items.length-1) { selectItem(cur+1); }
  else {
    document.getElementById('done-msg').style.display='block';
    document.getElementById('cur-label').textContent='All done!';
    document.getElementById('time-display').textContent='00:00';
    document.getElementById('btn-start').textContent='Start';
  }
}

selectItem(0);
</script>
</body>
</html>
